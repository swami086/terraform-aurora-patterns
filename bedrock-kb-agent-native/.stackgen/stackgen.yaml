version: "1.0.8"

representation:
  side_panel:
    label: "Bedrock KB + Agent"
    icon: "aws-bedrock"
  node:
    label:
      static: "Bedrock KB + Agent"
      template: "${kb_name} / ${agent_name}"

variables:
  kb_name:
    label: "Knowledge Base Name"
    description: "Name of the native Bedrock Knowledge Base."
    type: "string"
    ui_control: "text"
    validation:
      required: true
  agent_name:
    label: "Agent Name"
    description: "Name of the native Bedrock Agent."
    type: "string"
    ui_control: "text"
    validation:
      required: true
  embedding_model_arn:
    label: "Embedding Model ARN"
    description: "ARN of the Titan (or other) embedding foundation model."
    type: "string"
    ui_control: "text"
    validation:
      required: true
  foundation_model_id:
    label: "Foundation Model ID"
    description: "Claude (or other) model ID used by the Bedrock Agent."
    type: "string"
    ui_control: "text"
    validation:
      required: true
  s3_bucket_arn:
    label: "Knowledge Documents S3 ARN"
    description: "S3 bucket ARN for KB document ingestion."
    type: "string"
    ui_control: "text"
    validation:
      required: true
  vector_store_type:
    label: "Vector Store Type"
    description: "OPENSEARCH_SERVERLESS (default, VPC-safe) or OPENSEARCH_MANAGED_CLUSTER (public domain only)."
    type: "string"
    ui_control: "select"
    validation:
      required: true
  opensearch_serverless_collection_name:
    label: "Serverless Collection Name"
    description: "VECTORSEARCH collection name (optional; defaults to {kb_name}-vec)."
    type: "string"
    ui_control: "text"
  opensearch_collection_arn:
    label: "Serverless Collection ARN"
    description: "Use an existing collection ARN to skip collection creation."
    type: "string"
    ui_control: "text"
  opensearch_domain_arn:
    label: "OpenSearch Domain ARN"
    description: "Managed domain ARN — only when vector_store_type is OPENSEARCH_MANAGED_CLUSTER."
    type: "string"
    ui_control: "text"
  opensearch_domain_endpoint:
    label: "OpenSearch Domain Endpoint"
    description: "Managed cluster only. Leave empty or auto to derive from domain ARN."
    type: "string"
    ui_control: "text"
  manage_opensearch_domain_access_policy:
    label: "Manage OpenSearch Domain Access Policy"
    description: "Managed cluster only. Grants KB IAM role access via domain policy."
    type: "bool"
    ui_control: "select"
  region:
    label: "Region"
    description: "AWS region for Bedrock Agent and Knowledge Base resources."
    type: "string"
    ui_control: "text"
  agent_instruction:
    label: "Agent Instruction"
    description: "System instruction for the Bedrock Agent."
    type: "string"
    ui_control: "textarea"
  tags:
    label: "Tags"
    description: "Tags applied to Bedrock and IAM resources (ManagedBy and Module are merged automatically)."
    type: "map(string)"
    ui_control: "dictionary"

layouts:
  - name: default
    label: Default
    sections:
      - type: section
        label: Required
        attributes:
          - kb_name
          - agent_name
          - embedding_model_arn
          - foundation_model_id
          - s3_bucket_arn
          - vector_store_type
      - type: section
        label: OpenSearch Serverless
        attributes:
          - opensearch_serverless_collection_name
          - opensearch_collection_arn
      - type: section
        label: Managed OpenSearch (legacy)
        attributes:
          - opensearch_domain_arn
          - opensearch_domain_endpoint
          - manage_opensearch_domain_access_policy
      - type: section
        label: Optional
        attributes:
          - region
          - agent_instruction
          - tags

variable_groups:
  - label: "Required"
    description: "Core Bedrock KB + Agent wiring"
    variables:
      - kb_name
      - agent_name
      - embedding_model_arn
      - foundation_model_id
      - s3_bucket_arn
      - vector_store_type
  - label: "OpenSearch Serverless"
    description: "Default vector store for VPC platforms"
    variables:
      - opensearch_serverless_collection_name
      - opensearch_collection_arn
  - label: "Managed OpenSearch (legacy)"
    description: "Public managed domain only"
    variables:
      - opensearch_domain_arn
      - opensearch_domain_endpoint
      - manage_opensearch_domain_access_policy
  - label: "Optional"
    description: "Region, instruction, tags"
    variables:
      - region
      - agent_instruction
      - tags
